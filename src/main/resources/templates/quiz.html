<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz</title>
</head>
<body>

<h2 th:text="${language} + ' Quiz'"></h2>

<form action="/submit" method="post" th:action="@{/submit}" th:object="${questions}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    
    <div th:each="q, i : ${questions}">
        <p th:text="${i.index + 1} + '. ' + ${q.question}"></p>
        <input type="radio" th:name="${q.id}" th:value="${q.option1}" />
        <span th:text="${q.option1}"></span><br/>

        <input type="radio" th:name="${q.id}" th:value="${q.option2}" />
        <span th:text="${q.option2}"></span><br/>

        <input type="radio" th:name="${q.id}" th:value="${q.option3}" />
        <span th:text="${q.option3}"></span><br/>

        <input type="radio" th:name="${q.id}" th:value="${q.option4}" />
        <span th:text="${q.option4}"></span><br/><br/>
    </div>

    <button type="submit">Submit Quiz</button>
</form>
</body>
</html>
