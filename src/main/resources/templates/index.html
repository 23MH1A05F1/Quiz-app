<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz Application</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            color: #333;
        }

        h2 {
            margin-top: 40px;
            color: #555;
        }

        .quiz-links {
            margin-top: 30px;
        }

        .quiz-links a {
            display: inline-block;
            width: 250px;
            margin: 10px;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }

        .quiz-links a:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Welcome to Quiz Application</h1>

    <h2>Select Programming Language</h2>

    <div class="quiz-links">

        <a href="/quiz/java">Java Quiz</a>
        <a href="/quiz/python">Python Quiz</a>
        <a href="/quiz/c">C Programming Quiz</a>
        <a href="/quiz/springboot">Spring Boot Quiz</a>
        <a href="/quiz/html">HTML Quiz</a>
        <a href="/quiz/css">CSS Quiz</a>
        <a href="/quiz/javascript">JavaScript Quiz</a>
        <a href="/quiz/express">Express.js Quiz</a>

    </div>

</div>
</body>
</html>
